services:
  dashboard:
    build:
      context: .
      args:
        VITE_API_URL: /api
    ports:
      - "9080:80"   # external port — change if in use
    depends_on:
      - api

  api:
    build:
      context: ../exchanges-spreads-service
      dockerfile: Dockerfile
    env_file:
      - .env.api
    # PORT=8000, LOG_LEVEL, HTTP_TIMEOUT, PRICE_UPDATE_INTERVAL required in .env.api
